<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>출장마사지 업체 상세정보 | 전국 출장홈타이</title>
  <meta name="description" content="전국 출장마사지·홈타이 업체 상세 정보를 지역별로 확인해보세요." />
  <style>
    :root {
      --text: #e5e7eb;
      --text-soft: #9ca3af;
      --border: #1f2933;
      --radius-xl: 18px;
      --primary-soft: rgba(99, 102, 241, 0.12);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Pretendard", system-ui, sans-serif;
      background: radial-gradient(circle at top, #111827 0, #020617 50%, #000 100%);
      color: var(--text);
      min-height: 100vh;
    }
    a { color: inherit; text-decoration: none; }
    .page { max-width: 900px; margin: 0 auto; padding: 24px 16px 64px; }
    header {
      margin-bottom: 18px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
    }
    .logo { font-size: 18px; font-weight: 700; letter-spacing: -0.03em; }
    .back-link {
      font-size: 12px;
      color: var(--text-soft);
      border-radius: 999px;
      border: 1px solid var(--border);
      padding: 4px 10px;
    }
    .card {
      background: rgba(15, 23, 42, 0.9);
      border-radius: var(--radius-xl);
      border: 1px solid var(--border);
      padding: 0;
      overflow: hidden;
      box-shadow: 0 18px 50px rgba(15, 23, 42, 0.9);
    }
    .detail-hero {
      width: 100%;
      aspect-ratio: 21 / 9;
      max-height: 320px;
      background: #0f172a;
      overflow: hidden;
    }
    .detail-hero img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .detail-inner { padding: 16px 16px 20px; }
    .shop-title {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.04em;
      margin-bottom: 6px;
    }
    .shop-location {
      font-size: 13px;
      color: var(--text-soft);
      margin-bottom: 8px;
    }
    .meta-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      font-size: 12px;
      margin-bottom: 10px;
    }
    .pill {
      padding: 3px 9px;
      border-radius: 999px;
      border: 1px solid rgba(55, 65, 81, 0.9);
      font-size: 11px;
      color: var(--text-soft);
    }
    .pill.primary {
      border-color: rgba(129, 140, 248, 0.9);
      background: var(--primary-soft);
      color: #e5e7ff;
    }
    .section-title {
      font-size: 15px;
      font-weight: 600;
      margin: 16px 0 6px;
    }
    .body-text {
      font-size: 13px;
      color: var(--text-soft);
      line-height: 1.8;
      white-space: pre-line;
    }
    .list { margin: 6px 0 0; padding-left: 18px; font-size: 13px; color: var(--text-soft); }
    .list li { margin-bottom: 4px; }
    .course-block {
      margin-bottom: 12px;
      padding: 10px;
      border-radius: 10px;
      border: 1px solid rgba(55, 65, 81, 0.6);
      background: rgba(2, 6, 23, 0.35);
    }
    .course-cat { font-size: 13px; font-weight: 600; margin-bottom: 6px; color: #e5e7eb; }
    .course-item { font-size: 12px; color: var(--text-soft); margin-bottom: 4px; padding-left: 8px; border-left: 2px solid rgba(99, 102, 241, 0.5); }
    .review-item {
      padding: 10px;
      border-radius: 10px;
      border: 1px solid rgba(55, 65, 81, 0.5);
      margin-bottom: 8px;
      font-size: 12px;
      color: var(--text-soft);
    }
    .review-head { font-size: 11px; color: #9ca3af; margin-bottom: 4px; }
    .tag-row { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
    .tag { font-size: 10px; padding: 2px 8px; border-radius: 999px; border: 1px solid rgba(55, 65, 81, 0.9); color: #9ca3af; }
    .seo-block {
      margin-top: 18px;
      padding-top: 12px;
      border-top: 1px dashed rgba(55, 65, 81, 0.8);
      font-size: 13px;
      color: var(--text-soft);
      line-height: 1.8;
      white-space: pre-line;
    }
  </style>
</head>
<body>
  <div class="page">
    <header>
      <div class="logo">전국 출장마사지 · 홈타이 상세보기</div>
      <a href="index.html" class="back-link">← 전체 리스트로 돌아가기</a>
    </header>

    <article class="card" id="detail-root" aria-busy="true">
      업체 정보를 불러오는 중입니다…
    </article>
  </div>

  <script src="shop-card-data.js"></script>
  <script src="shops.json"></script>
  <script src="shop-resolve.js"></script>
  <script>
    (function () {
      function getParam(name) {
        return new URLSearchParams(window.location.search).get(name);
      }

      var root = document.getElementById('detail-root');
      var id = getParam('id');
      var cardList = window.shopCardData || [];
      var shopsArr = (window.shopsData && window.shopsData.shops) ? window.shopsData.shops : [];

      var card = cardList.find(function (c) { return String(c.id) === String(id); });
      var shop = card ? window.shopResolve.findShopByCard(card, shopsArr) : shopsArr.find(function (s) { return String(s.id) === String(id); });

      if (!card && !shop) {
        root.textContent = '해당 업체 정보를 찾을 수 없습니다.';
        root.setAttribute('aria-busy', 'false');
        return;
      }

      var imgUrl = window.shopResolve.resolveImage(card, shop);
      var region = (card && card.region) || (shop && shop.region) || '';
      var district = (card && card.district) || (shop && shop.district) || '';
      var dong = (card && card.dong) || '';
      var name = (shop && shop.name) || (card && card.name) || '';
      var description = (shop && shop.description) || (card && card.description) || '';
      var operatingHours = (shop && shop.operatingHours) || (card && card.operatingHours) || '';
      var phone = (shop && shop.phone) || (card && card.phone) || '';
      var rating = (shop && shop.rating != null) ? shop.rating : (card && card.rating);
      var reviewCount = (shop && shop.reviewCount != null) ? shop.reviewCount : (card && card.reviewCount);
      var price = (shop && shop.price) || (card && card.price) || '';
      var services = (shop && shop.services && shop.services.length) ? shop.services : (card && card.services) || [];
      var address = (shop && shop.address) || (card && card.address) || '';
      var detailAddress = (shop && shop.detailAddress) || (card && card.detailAddress) || '';

      var hero = document.createElement('div');
      hero.className = 'detail-hero';
      if (imgUrl) {
        var img = document.createElement('img');
        img.src = imgUrl;
        img.alt = (card && card.alt) || name;
        img.loading = 'eager';
        img.onerror = function () { hero.style.display = 'none'; };
        hero.appendChild(img);
      } else {
        hero.style.display = 'none';
      }

      var inner = document.createElement('div');
      inner.className = 'detail-inner';

      var title = document.createElement('h1');
      title.className = 'shop-title';
      title.textContent = (region ? '[' + region + '] ' : '') + name;

      var loc = document.createElement('div');
      loc.className = 'shop-location';
      var locLine = [region, district, dong].filter(Boolean).join(' · ');
      if (!locLine) locLine = address;
      if (detailAddress) locLine += (locLine ? ' · ' : '') + detailAddress;
      loc.textContent = locLine;

      var meta = document.createElement('div');
      meta.className = 'meta-row';
      var ratingEl = document.createElement('span');
      ratingEl.className = 'pill primary';
      ratingEl.textContent = '★ ' + (rating != null ? rating : '-') + '점';
      var reviewsEl = document.createElement('span');
      reviewsEl.className = 'pill';
      reviewsEl.textContent = reviewCount != null ? '리뷰 ' + reviewCount + '개' : '리뷰 확인';
      var phoneEl = document.createElement('span');
      phoneEl.className = 'pill';
      phoneEl.textContent = phone ? '예약 ' + phone : '문의 시 연결';
      var priceEl = document.createElement('span');
      priceEl.className = 'pill';
      priceEl.textContent = price || '가격 상담';
      meta.appendChild(ratingEl);
      meta.appendChild(reviewsEl);
      meta.appendChild(phoneEl);
      meta.appendChild(priceEl);

      inner.appendChild(title);
      inner.appendChild(loc);
      inner.appendChild(meta);

      var hoursTitle = document.createElement('div');
      hoursTitle.className = 'section-title';
      hoursTitle.textContent = '영업시간';
      var hoursBody = document.createElement('div');
      hoursBody.className = 'body-text';
      hoursBody.textContent = operatingHours || '상담 시 안내';
      inner.appendChild(hoursTitle);
      inner.appendChild(hoursBody);

      var svcTitle = document.createElement('div');
      svcTitle.className = 'section-title';
      svcTitle.textContent = '제공 서비스';
      var svcList = document.createElement('ul');
      svcList.className = 'list';
      services.forEach(function (s) {
        var li = document.createElement('li');
        li.textContent = s;
        svcList.appendChild(li);
      });
      if (!svcList.children.length) {
        var li0 = document.createElement('li');
        li0.textContent = '상담 시 안내';
        svcList.appendChild(li0);
      }
      inner.appendChild(svcTitle);
      inner.appendChild(svcList);

      if (shop && shop.courses && shop.courses.length) {
        var cTitle = document.createElement('div');
        cTitle.className = 'section-title';
        cTitle.textContent = '코스 · 요금';
        inner.appendChild(cTitle);
        shop.courses.forEach(function (cat) {
          var block = document.createElement('div');
          block.className = 'course-block';
          var catEl = document.createElement('div');
          catEl.className = 'course-cat';
          catEl.textContent = cat.category || '';
          block.appendChild(catEl);
          (cat.items || []).forEach(function (it) {
            var line = document.createElement('div');
            line.className = 'course-item';
            line.textContent =
              (it.name || '') +
              ' · ' +
              (it.price || '') +
              ' · ' +
              (it.duration || '') +
              (it.description ? ' — ' + it.description : '');
            block.appendChild(line);
          });
          inner.appendChild(block);
        });
      }

      if (shop && shop.staffInfo) {
        var stTitle = document.createElement('div');
        stTitle.className = 'section-title';
        stTitle.textContent = '관리사 안내';
        var stBody = document.createElement('div');
        stBody.className = 'body-text';
        stBody.textContent = shop.staffInfo;
        inner.appendChild(stTitle);
        inner.appendChild(stBody);
      }

      if (shop && shop.features && shop.features.length) {
        var fTitle = document.createElement('div');
        fTitle.className = 'section-title';
        fTitle.textContent = '특징';
        var tagRow = document.createElement('div');
        tagRow.className = 'tag-row';
        shop.features.forEach(function (f) {
          var t = document.createElement('span');
          t.className = 'tag';
          t.textContent = f;
          tagRow.appendChild(t);
        });
        inner.appendChild(fTitle);
        inner.appendChild(tagRow);
      }

      var descTitle = document.createElement('div');
      descTitle.className = 'section-title';
      descTitle.textContent = '샵 소개';
      var descBody = document.createElement('div');
      descBody.className = 'body-text';
      descBody.textContent = description || '상담 시 안내드립니다.';
      inner.appendChild(descTitle);
      inner.appendChild(descBody);

      if (shop && shop.reviews && shop.reviews.length) {
        var rvTitle = document.createElement('div');
        rvTitle.className = 'section-title';
        rvTitle.textContent = '이용 후기';
        inner.appendChild(rvTitle);
        shop.reviews.forEach(function (r) {
          var box = document.createElement('div');
          box.className = 'review-item';
          var head = document.createElement('div');
          head.className = 'review-head';
          head.textContent =
            (r.name || '') +
            ' · ★' +
            (r.rating != null ? r.rating : '-') +
            ' · ' +
            (r.date || '');
          var body = document.createElement('div');
          body.textContent = r.comment || '';
          box.appendChild(head);
          box.appendChild(body);
          inner.appendChild(box);
        });
      } else if (card && card.reviews && card.reviews.length) {
        var rvTitle2 = document.createElement('div');
        rvTitle2.className = 'section-title';
        rvTitle2.textContent = '이용 후기';
        inner.appendChild(rvTitle2);
        card.reviews.forEach(function (r) {
          var box = document.createElement('div');
          box.className = 'review-item';
          var head = document.createElement('div');
          head.className = 'review-head';
          head.textContent =
            (r.author || '') +
            ' · ★' +
            (r.rating != null ? r.rating : '-') +
            ' · ' +
            (r.date || '');
          var body = document.createElement('div');
          body.textContent = r.review || '';
          box.appendChild(head);
          box.appendChild(body);
          inner.appendChild(box);
        });
      }

      var regionLabel = [region, district, dong].filter(Boolean).join(' ');
      var baseKeyword = (regionLabel || name || '전국') + ' 출장마사지';
      var seo = document.createElement('div');
      seo.className = 'seo-block';
      seo.textContent =
        (regionLabel || '해당 지역') +
        '에서 출장마사지·홈타이를 찾는 분들을 위해 “' +
        name +
        '”의 정보를 정리했습니다. ' +
        baseKeyword +
        ' 검색 시 참고할 수 있도록 영업시간, 연락처, 제공 서비스와 코스 안내를 포함했습니다. ' +
        '예약 전 문의를 통해 방문 가능 시간과 프로그램 구성을 확인하시면 더 만족스러운 이용이 가능합니다.';

      inner.appendChild(seo);

      root.innerHTML = '';
      if (imgUrl) root.appendChild(hero);
      root.appendChild(inner);
      root.setAttribute('aria-busy', 'false');
    })();
  </script>
</body>
</html>
